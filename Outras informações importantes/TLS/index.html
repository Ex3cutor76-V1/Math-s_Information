<h1>O que é um TLS? (Transport Layer Security):</h1>
<p></p>
<h3>É o protocolo moderno que protege a comunicação na internet com criptografia, ele é basicamente o sucessor
    do SSL.
</h3>
<p></p>
<h2>Para que serve?:</h2>
<h3>Ele serve para as mesmas coisas que o SSL, no caso confidencialidade, integridade e autenticidade.</h3>
